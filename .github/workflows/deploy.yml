name: Deploy ETF EDA Dashboard to GitHub Pages

on:
  schedule:
    - cron: '*/1 * * * *' # Run every 1 minute
  workflow_dispatch: # Enable manual trigger
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - '.gitignore'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-data-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv and dependencies
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.local/bin:$PATH"
          uv pip install --system requests pandas numpy

      - name: Collect Fresh ETF Data
        run: |
          python src/collect_fallback.py

      - name: Commit and Push Updated Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/etf_fallback.json
          if ! git diff-index --quiet HEAD; then
            git commit -m "chore: auto-update etf fallback data [skip ci]"
            git push
          else
            echo "No data changes detected. Skipping commit."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload index.html and the data/ folder containing the JSON data
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
